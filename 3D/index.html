<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ApateJS 3D</title>

    <script src="objs.js"></script>
    <script src="objectLoader.js"></script>

    <script src="shaders.js"></script>
    <script src="gl-matrix-min.js"></script>

    <script src="apate.js" defer></script>
    <script src="main.js" defer></script>

</head>

<body>
    <div id="main"></div>
    <div id="sliders">

</html>
